version: '3.8'

services:
  jarvis:
    build: .
    container_name: jarvis_app
    restart: always
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./downloads:/app/downloads
      - ./audio_cache:/app/audio_cache
      - ./logs:/app/logs
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - jarvis_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  redis:
    image: redis:7-alpine
    container_name: jarvis_redis
    restart: always
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - jarvis_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:alpine
    container_name: jarvis_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      # Uncomment the below lines and place your certs in ./certs if not using certbot container
      # - ./certs:/etc/nginx/ssl:ro
    depends_on:
      - jarvis
    networks:
      - jarvis_net

volumes:
  redis_data:

networks:
  jarvis_net:
    driver: bridge
