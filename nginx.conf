worker_processes auto;
events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    
    sendfile        on;
    keepalive_timeout  65;

    # Basic security headers
    server_tokens off;
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-XSS-Protection "1; mode=block";

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Rate limiting zone (10 requests per second)
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

    # Max body size (allows up to 30MB for audio uploads)
    client_max_body_size 30M;

    upstream jarvis_backend {
        server jarvis:8000;
    }

    server {
        listen 80;
        server_name _; # Catch-all, configure your domain if needed

        # Redirect all HTTP traffic to HTTPS
        # Uncomment in production when SSL is configured
        # return 301 https://$host$request_uri;

        # Block common attack paths
        location ~ /\.(env|git|svn|ht) {
            deny all;
        }

        # WebSocket endpoint
        location /ws/ {
            proxy_pass http://jarvis_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
            proxy_read_timeout 86400s; # Keep WebSockets alive
            proxy_send_timeout 86400s;
        }

        # Main API endpoints
        location / {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://jarvis_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
